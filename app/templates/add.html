{%extends "base.html"%}

{% block title %} Add Expense {% endblock %}

{% block content %}

<div class="form-page">
    <div class="form-card">
        <div class="form-header">
            <span class="form-icon">➕</span>
            <h2>Add Expense</h2>
            <p class="form-subtitle">Record a new expense entry</p>
        </div>
        <form action="/add" method="POST" id="add-expense-form">
            <div class="form-group">
                <label for="category">Category</label>
                <input type="text" name="category" id="category" placeholder="e.g. Food, Transport, Bills..." required>
            </div>

            <div class="form-group">
                <label for="amount">Amount (₹)</label>
                <input type="number" name="amount" id="amount" step="0.01" placeholder="0.00" required>
            </div>

            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" name="date" id="date" required>
            </div>

            <button type="submit" class="btn btn-primary btn-full" id="submit-add-btn">Add Expense</button>
            <a href="/" class="btn btn-ghost btn-full" id="cancel-add-btn">Cancel</a>
        </form>
    </div>
</div>

{% endblock %}
