{% extends "base.html" %}

{% block title %}Edit Expense{% endblock %}

{% block content %}

<div class="form-page">
    <div class="form-card">
        <div class="form-header">
            <span class="form-icon">✏️</span>
            <h2>Edit Expense</h2>
            <p class="form-subtitle">Update this expense entry</p>
        </div>
        <form method="post" id="edit-expense-form">
            <div class="form-group">
                <label for="category">Category</label>
                <input type="text" name="category" id="category" value="{{ expense.category }}" required>
            </div>

            <div class="form-group">
                <label for="amount">Amount (₹)</label>
                <input type="number" name="amount" id="amount" step="0.01" value="{{ expense.amount }}" required>
            </div>

            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" name="date" id="date" value="{{ expense.date }}" required>
            </div>

            <button type="submit" class="btn btn-primary btn-full" id="submit-edit-btn">Update Expense</button>
            <a href="/" class="btn btn-ghost btn-full" id="cancel-edit-btn">Cancel</a>
        </form>
    </div>
</div>

{% endblock %}
