<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Track and manage your daily expenses with ease.">
    <title>{% block title %}Expense Tracker{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<!-- Animated background orbs -->
<div class="bg-orb bg-orb--1"></div>
<div class="bg-orb bg-orb--2"></div>
<div class="bg-orb bg-orb--3"></div>

<div class="app-wrapper">
    <header class="app-header">
        <a href="/" class="logo" id="logo-link">
            <span class="logo-icon">💰</span>
            <span class="logo-text">Expense Tracker</span>
        </a>
        <nav class="nav-links">
            <a href="/" class="nav-link" id="nav-home">Home</a>
            <a href="/add" class="nav-link" id="nav-add">+ Add</a>
        </nav>
    </header>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="app-footer">
        <p>&copy; 2026 Expense Tracker &mdash; Keep your finances in check.</p>
    </footer>
</div>

</body>
</html>
